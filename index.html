<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deep Nexivra</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<header class="header">
  <div class="container nav">
    <div class="brand">
      <span>Deep Nexivra</span>
    </div>
  </div>
</header>

<section style="padding: 120px 20px;">
  <div class="container">

    <h1 style="color:white; margin-bottom:20px;">
      Execution Intelligence Platform
    </h1>

    <div class="analyze-box">

      <textarea id="ideaInput" placeholder="Describe your business idea..."></textarea>

      <input id="locationInput" placeholder="Location (e.g. Toronto)" />
      <input id="budgetInput" placeholder="Budget (e.g. $10,000)" />
      <input id="timelineInput" placeholder="Timeline (e.g. 3 months)" />

      <button id="analyzeBtn">Analyze Idea</button>

      <div id="analysisResult"></div>

    </div>

  </div>
</section>

<script src="script.js"></script>
</body>
</html>
