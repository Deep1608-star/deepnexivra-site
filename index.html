<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep Nexivra</title>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at center, #0f2027, #203a43, #0f2027);
  color: white;
}

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  margin-top: 20px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

button {
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: #00ffcc;
  font-weight: bold;
}

.result {
  margin-top: 20px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div style="position:fixed;top:10px;right:10px;">
  <input id="emailInput" placeholder="Enter email" />
  <button onclick="loginUser(document.getElementById('emailInput').value)">Login</button>
</div>

<div class="container">

  <h2>Business Idea Analyzer</h2>

  <div class="card">
    <textarea id="idea" placeholder="Business idea"></textarea>
    <input id="location" placeholder="Location">
    <input id="budget" placeholder="Budget">
    <input id="timeline" placeholder="Timeline">

    <button onclick="analyzeIdea()">Analyze Idea</button>
  </div>

  <div class="result" id="result"></div>

</div>

<script>
/* =============================
   SUPABASE CONFIG
============================= */
const SUPABASE_URL = "PASTE_YOUR_URL";
const SUPABASE_KEY = "PASTE_YOUR_ANON_KEY";
const supabaseClient = supabase.createClient(https://supabase.com/dashboard/project/oggwnbbfuaemkrpxvctd, eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9nZ3duYmJmdWFlbWtycHh2Y3RkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NDMzNjcsImV4cCI6MjA5MjExOTM2N30.p1lKczMqndxcvpqgqI_DcB3SEeWP1n-FmX8xh_BWZrE);

/* =============================
   LOGIN
============================= */
async function loginUser(email) {
  const { data, error } = await supabaseClient
    .from('users')
    .upsert([{ email: email }])
    .select();

  if (error) {
    alert("Login failed");
    return;
  }

  localStorage.setItem("userEmail", email);
  alert("Logged in");
}

/* =============================
   ANALYZE IDEA
============================= */
async function analyzeIdea() {

  const idea = document.getElementById("idea").value;
  const location = document.getElementById("location").value;
  const budget = document.getElementById("budget").value;
  const timeline = document.getElementById("timeline").value;

  const isPremium = localStorage.getItem("premiumUser") === "true";

  let basicResult = `
    <div class="card">
      <h3>Execution Analysis</h3>
      <p><b>Idea:</b> ${idea}</p>
      <p><b>Market:</b> Growing demand in ${location}</p>
      <p><b>Difficulty:</b> Medium</p>
      <p><b>Estimated Cost:</b> ${budget}</p>
    </div>
  `;

  let premiumResult = `
    <div class="card">
      <h3>Premium Insights</h3>
      <p><b>Pricing Strategy:</b> Tiered pricing model</p>
      <p><b>Revenue Model:</b> Recurring customers</p>
      <p><b>Customer Plan:</b> Local marketing + referrals</p>
      <p><b>Execution Plan:</b> Launch in ${timeline}</p>
    </div>
  `;

  if (!isPremium) {
    basicResult += `
      <div class="card">
        <p>🔒 Unlock full plan</p>
        <button onclick="window.location.href='/upgrade.html'">Upgrade</button>
      </div>
    `;
  } else {
    basicResult += premiumResult;
  }

  document.getElementById("result").innerHTML = basicResult;

  /* =============================
     SAVE REPORT
  ============================= */
  const email = localStorage.getItem("userEmail");

  if (email) {
    await supabaseClient.from("reports").insert([{
      idea,
      location,
      budget,
      timeline,
      result: basicResult
    }]);
  }

}
</script>

</body>
</html>
