<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeepNexivra</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 60px 20px;
    }

    h1 {
      font-size: 56px;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 24px;
      color: #94a3b8;
    }

    p {
      max-width: 600px;
      line-height: 1.6;
      margin-top: 20px;
    }

    .buttons {
      margin-top: 30px;
    }

    button {
      padding: 12px 24px;
      margin-right: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .primary {
      background: #3b82f6;
      color: white;
    }

    .secondary {
      background: transparent;
      border: 1px solid #3b82f6;
      color: #3b82f6;
    }

    .section {
      margin-top: 80px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>DeepNexivra</h1>
    <h2>Engineering Intelligence for a Smarter World</h2>

    <p>
      Transforming complex operational challenges into optimized, data-driven decisions using advanced engineering intelligence systems.
    </p>

    <div class="buttons">
      <button class="primary">Start Optimizing</button>
      <button class="secondary">Explore Tools</button>
    </div>

    <div class="section">
      <h2>Core Capabilities</h2>

      <div class="cards">
        <div class="card">Operations Optimization</div>
        <div class="card">Workforce Intelligence</div>
        <div class="card">Data Analytics Engine</div>
        <div class="card">Automation Systems</div>
      </div>
    </div>

  </div>

</body>
</html>
