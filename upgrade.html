<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upgrade to Pro</title>

  <!-- PayPal SDK -->
  <script src="https://www.paypal.com/sdk/js?client-id=AcQW8-oTG-BH7FwDXscEnai2PF5pO1U3D2B9VK6MeEzU_0xlHoGckUoT7IggIbIGhfjq4XzX47g7p9lR&currency=USD"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at center, #0f2027, #203a43, #0f2027);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 40px;
      width: 90%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 28px;
    }

    p {
      opacity: 0.8;
      margin-bottom: 25px;
    }

    #paypal-button-container {
      margin-top: 20px;
    }

    .price {
      margin-top: 20px;
      font-size: 16px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Upgrade to Pro</h1>
    <p>Unlock full execution roadmap, monetization strategy, and premium AI insights.</p>

    <div id="paypal-button-container"></div>

    <div class="price">Price: $9 USD</div>
  </div>

  <script>
    paypal.Buttons({
      createOrder: function(data, actions) {
        return actions.order.create({
          purchase_units: [{
            amount: {
              value: '9.00'
            }
          }]
        });
      },

      onApprove: function(data, actions) {
        return actions.order.capture().then(function(details) {
          // Save unlock locally
          localStorage.setItem("premiumUser", "true");

          // Redirect after payment
          window.location.href = "/success.html";
        });
      },

      onError: function(err) {
        console.error(err);
        alert("Payment failed. Please try again.");
      }

    }).render('#paypal-button-container');
  </script>

</body>
</html>
